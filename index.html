<div class="toolbar">
<button onclick="openJob()">+ Zakázka</button><button onclick="openWorker()">+ Pracovník</button><button onclick="openVehicle()">+ Vozidlo</button>
<button class="secondary" onclick="prevWeek()">← týden</button><button class="secondary" onclick="goToday()">dnes</button><button class="secondary" onclick="nextWeek()">týden →</button>
<input id="search" placeholder="Hledat zakázku, adresu, kontakt..." oninput="render()">
<select id="viewMode" onchange="render()"><option value="workers">Pohled podle pracovníků</option><option value="vehicles">Pohled podle vozidel</option></select>
<select id="jobFilter" onchange="render()"><option value="active">Aktivní</option><option value="archive">Archiv</option><option value="all">Vše</option><option value="to_invoice">Čeká na fakturaci</option><option value="overrun">Přetažené</option></select>
<button class="secondary" onclick="exportData()">Export</button><button class="secondary" onclick="document.getElementById('importFile').click()">Import</button><input id="importFile" type="file" accept="application/json" class="hidden" onchange="importData(event)">
</div>
<div class="layout">
<aside>
<div class="tabs"><div class="tab active" id="tabJobs" onclick="switchTab('jobs')">Zakázky</div><div class="tab" id="tabPeople" onclick="switchTab('people')">Lidé</div><div class="tab" id="tabCars" onclick="switchTab('cars')">Vozidla</div></div>
<section id="sideJobs"><h2 id="jobsTitle">Zakázky</h2><div id="unassigned" class="list"></div></section>
<section id="sidePeople" class="hidden"><h2>Pracovníci</h2><div id="peopleList" class="list"></div></section>

</aside>
<main class="board-wrap"><div class="board"><div id="head" class="head"></div><div id="body"></div></div></main>
</div>

<div id="jobModal" class="modal"><div class="dialog"><h2 id="jobModalTitle">Zakázka</h2>
<div class="grid">
<label>Název zakázky<input id="j_title"></label>
<label>Priorita<select id="j_priority"><option>Vysoká</option><option>Střední</option><option>Nízká</option></select></label>
<label>Požadovaná odbornost<select id="j_skill"><option>Elektroinstalace</option><option>Optika</option><option>Kancelář</option><option>Servis</option><option>Montáž</option><option>Revize</option><option>Bez požadavku</option></select></label>
<label>Stav<select id="j_state"><option>Nová</option><option>Naplánováno</option><option>Probíhá</option><option>Dokončeno</option><option>Vyfakturováno</option><option>Storno</option></select></label>
<label class="full">Adresa<input id="j_address"></label><label>Kontakt<input id="j_contact"></label><label>Telefon<input id="j_phone"></label>
<label>Počet dní<input id="j_days" type="number" min="0" step="0.5" value="1" oninput="syncEstimateFromDaysPeople()"></label>
<label>Počet pracovníků<input id="j_people" type="number" min="0" step="1" value="1" oninput="syncEstimateFromDaysPeople()"></label>
<label>Odhad člověkodnů<input id="j_estimated" type="number" min="0" step="0.25" value="1"></label>
<label>Vytížení bloku pracovníka %<input id="j_load" type="number" min="0" max="200" step="25" value="100"></label>
<label>Vytížení bloku vozidla %<input id="j_vehicle_load" type="number" min="0" max="200" step="25" value="100"></label>
<label>Čas od<input id="j_from" type="time"></label><label>Čas do<input id="j_to" type="time"></label>

</div><div id="jobStats" class="small" style="margin-top:10px"></div>
<div class="actions"><button class="secondary" onclick="closeModal('jobModal')">Zavřít</button><button class="secondary" id="duplicateJobBtn" onclick="duplicateJob()">Duplikovat</button><button class="secondary" id="completeJobBtn" onclick="setJobState('Dokončeno')">Dokončeno</button><button class="secondary" id="invoiceJobBtn" onclick="setJobState('Vyfakturováno')">Vyfakturováno</button><button class="danger" id="deleteJobBtn" onclick="deleteJob()">Smazat</button><button onclick="saveJob()">Uložit</button></div>
</div></div>

<div id="workerModal" class="modal"><div class="dialog"><h2 id="workerModalTitle">Pracovník</h2><div class="grid">
<label>Jméno<input id="w_title"></label><label>Email<input id="w_email"></label><label>Telefon<input id="w_phone"></label><label>Kapacita na den %<input id="w_capacity" type="number" min="0" max="300" value="100"></label>
<label class="full">Specializace pracovníka<select id="w_skills" multiple size="6"><option>Elektroinstalace</option><option>Optika</option><option>Kancelář</option><option>Servis</option><option>Montáž</option><option>Revize</option></select><div class="small">Podrž Ctrl pro výběr více specializací.</div></label>
</div><div class="actions"><button class="secondary" onclick="closeModal('workerModal')">Zavřít</button><button class="danger" id="deleteWorkerBtn" onclick="deleteWorker()">Smazat</button><button onclick="saveWorker()">Uložit</button></div></div></div>

<div id="vehicleModal" class="modal"><div class="dialog"><h2 id="vehicleModalTitle">Vozidlo</h2><div class="grid">
<label>Název / označení<input id="v_title"></label><label>SPZ<input id="v_spz"></label><label>Typ<input id="v_type"></label><label>Kapacita %<input id="v_capacity" type="number" min="0" max="300" value="100"></label><label class="full">Poznámka<textarea id="v_note" rows="3"></textarea></label>
</div><div class="actions"><button class="secondary" onclick="closeModal('vehicleModal')">Zavřít</button><button class="danger" id="deleteVehicleBtn" onclick="deleteVehicle()">Smazat</button><button onclick="saveVehicle()">Uložit</button></div></div></div>

<div id="assignModal" class="modal"><div class="dialog"><h2>Přiřazení zakázky</h2><p class="small">Zakázku můžeš přiřadit pracovníkovi i vozidlu. Nesoulad odbornosti se jen označí, neblokuje.</p>
<div class="grid"><label>Zakázka<input id="a_job_title" disabled></label><label>Datum<input id="a_date" type="date"></label><label>Pracovník<select id="a_worker"></select></label><label>Vozidlo<select id="a_vehicle"></select></label><label>Vytížení pracovníka %<input id="a_load" type="number" min="0" max="200" step="25"></label><label>Vytížení vozidla %<input id="a_vehicle_load" type="number" min="0" max="200" step="25"></label></div>
<div class="actions"><button class="secondary" onclick="closeModal('assignModal')">Zavřít</button><button class="danger" onclick="unassignCurrent()">Odebrat z plánu</button><button onclick="saveAssignmentFromModal()">Uložit přiřazení</button></div></div></div>

<script>

let db = {
  jobs: [],
  workers: [],
  vehicles: [],
  assignments: []
};

let weekStart = monday(new Date());
let selectedJobId = null;
let selectedWorkerId = null;
let selectedVehicleId = null;
let selectedAssignmentId = null;
let currentUser = null;
let realtimeSubscribed = false;
let canEdit = false;
  
function createEmptyDb(){return{jobs:[],workers:[],vehicles:[],assignments:[]}}
async function loadDb(){
  if(!currentUser) return;
  const { data, error } = await supabaseClient
    .from("app_state")
    .select("data")
    .eq("id", 1)
    .maybeSingle();

  if(error){
    console.error("LOAD ERROR:", error);
    alert("Chyba načtení supabaseClient: " + error.message);
    return;
  }

  if(data?.data){
    db = data.data;
  }else{
    db = createEmptyDb();
    await saveDb();
  }

  render();
}
async function saveDb(){

  if(!currentUser){
    alert("Nejste přihlášen");
    return false;
  }

  const { error } = await supabaseClient
    .from("app_state")
    .upsert({
      id: 1,
      data: db,
      updated_by: currentUser.email
    });

  if(error){

    console.error("SAVE ERROR:", error);

    alert("Chyba ukládání: " + error.message);

    return false;
  }

  setStatus("Uloženo do cloudu");

  return true;
}
function nextId(c){return c.reduce((m,i)=>Math.max(m,Number(i.id)||0),0)+1}
function setStatus(t){document.getElementById("status").textContent=t}
function esc(v){return String(v??"").replace(/[&<>"']/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]))}
function monday(d){const x=new Date(d),day=x.getDay()||7;x.setDate(x.getDate()-day+1);x.setHours(0,0,0,0);return x}
function addDays(d,n){const x=new Date(d);x.setDate(x.getDate()+n);return x}
function iso(d){const x=new Date(d);return `${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,"0")}-${String(x.getDate()).padStart(2,"0")}`}
function czDate(d){return d.toLocaleDateString("cs-CZ",{weekday:"short",day:"numeric",month:"numeric"})}
function priorityClass(p){p=String(p||"").toLowerCase();if(p.includes("vys"))return"high";if(p.includes("níz")||p.includes("niz"))return"low";return"medium"}
function jobVisualState(j){if(j.state==="Vyfakturováno")return"invoiced";if(j.state==="Dokončeno")return"done";return""}
function openModal(id){document.getElementById(id).classList.add("open")}function closeModal(id){document.getElementById(id).classList.remove("open")}
function jobById(id){return db.jobs.find(j=>Number(j.id)===Number(id))}function workerById(id){return db.workers.find(w=>Number(w.id)===Number(id))}function vehicleById(id){return db.vehicles.find(v=>Number(v.id)===Number(id))}function assignmentById(id){return db.assignments.find(a=>Number(a.id)===Number(id))}
function getSelectedMulti(id){return Array.from(document.getElementById(id).selectedOptions).map(o=>o.value)}
function setSelectedMulti(id,values){const set=new Set(values||[]);Array.from(document.getElementById(id).options).forEach(o=>o.selected=set.has(o.value))}
function workerHasSkill(w,skill){if(!skill||skill==="Bez požadavku")return true;return Array.isArray(w?.skills)&&w.skills.includes(skill)}
function plannedUnits(jobId){return db.assignments.filter(a=>Number(a.jobId)===Number(jobId)).reduce((s,a)=>s+(Number(a.load||100)/100),0)}
function jobProgress(j){const estimated=Math.max(Number(j.estimated||0),0),actual=plannedUnits(j.id),pct=estimated>0?Math.round((actual/estimated)*100):0;let color="#16a34a";if(pct>100)color="#dc2626";else if(pct>=85)color="#d97706";return{estimated,actual,pct,color,over:estimated>0&&actual>estimated}}
function isArchiveState(j){return["Dokončeno","Vyfakturováno","Storno"].includes(j.state)}
function matchesSearch(j){const q=document.getElementById("search").value.trim().toLowerCase();if(!q)return true;return[j.title,j.address,j.contact,j.phone,j.note,j.state,j.skill].join(" ").toLowerCase().includes(q)}
function matchesFilter(j){const f=document.getElementById("jobFilter").value,p=jobProgress(j);if(f==="active")return!isArchiveState(j);if(f==="archive")return isArchiveState(j);if(f==="to_invoice")return j.state==="Dokončeno";if(f==="overrun")return p.over;return true}
function switchTab(t){sideJobs.classList.toggle("hidden",t!=="jobs");sidePeople.classList.toggle("hidden",t!=="people");sideCars.classList.toggle("hidden",t!=="cars");tabJobs.classList.toggle("active",t==="jobs");tabPeople.classList.toggle("active",t==="people");tabCars.classList.toggle("active",t==="cars")}
function prevWeek(){weekStart=addDays(weekStart,-7);render()}function nextWeek(){weekStart=addDays(weekStart,7);render()}function goToday(){weekStart=monday(new Date());render()}
function rows(){const mode=viewMode.value;if(mode==="vehicles")return db.vehicles.map(v=>({kind:"vehicle",id:v.id,title:v.title,sub:[v.spz,v.type].filter(Boolean).join(" · "),capacity:Number(v.capacity||100)}));return db.workers.map(w=>({kind:"worker",id:w.id,title:w.title,sub:[w.email,w.phone].filter(Boolean).join(" · "),capacity:Number(w.capacity||100)}))}
function assignmentsFor(row,date){const d=iso(date);if(row.kind==="worker")return db.assignments.filter(a=>Number(a.workerId)===Number(row.id)&&a.date===d);return db.assignments.filter(a=>Number(a.vehicleId)===Number(row.id)&&a.date===d)}
function usedCapacity(row,ass){return row.kind==="worker"?ass.reduce((s,a)=>s+Number(a.load||100),0):ass.reduce((s,a)=>s+Number(a.vehicleLoad||100),0)}
function render(){renderHeader();renderSide();renderBoard()}
function renderHeader(){const days=["Pracovník / vozidlo"];for(let i=0;i<7;i++)days.push(czDate(addDays(weekStart,i)));head.innerHTML=days.map(d=>`<div>${esc(d)}</div>`).join("")}
function renderSide(){const assigned=new Set(db.assignments.map(a=>Number(a.jobId))),filter=jobFilter.value;jobsTitle.textContent=filter==="archive"?"Archiv zakázek":filter==="to_invoice"?"Čeká na fakturaci":filter==="overrun"?"Přetažené zakázky":"Zakázky";let visible=db.jobs.filter(j=>matchesFilter(j)&&matchesSearch(j));let side = visible;

if(filter !== "archive"){
  side = visible.filter(j => j.state !== "Vyfakturováno")};unassigned.innerHTML=side.length?side.map(j=>jobCard(j,null)).join(""):`<div class="empty">Žádné zakázky v tomto pohledu.</div>`;
peopleList.innerHTML=db.workers.length?db.workers.map(w=>`<div class="mini-card" ondblclick="openWorker(${w.id})"><div class="job-title">${esc(w.title)}</div><div class="job-meta">${esc(w.email||"")}</div><div class="badges">${(w.skills||[]).map(s=>`<span class="badge skill">${esc(s)}</span>`).join("")}</div><div class="quick-actions"><button class="secondary" onclick="openWorker(${w.id})">Upravit</button><button class="danger" onclick="deleteWorkerDirect(${w.id})">Smazat</button></div></div>`).join(""):`<div class="empty">Zatím nejsou založení pracovníci.</div>`;

function allowDrop(ev){

}

function leaveDrop(ev){

async function dropJob(ev){

  if(!canEdit){
    alert("Nemáte oprávnění k úpravám");
    return;
  }

  ev.preventDefault();

  ev.currentTarget.classList.remove("dragover");

  const jobId = Number(ev.dataTransfer.getData("jobId"));
  const assignmentId = Number(ev.dataTransfer.getData("assignmentId") || 0);

  const rowKind = ev.currentTarget.dataset.rowKind;
  const rowId = Number(ev.currentTarget.dataset.rowId);
  const date = ev.currentTarget.dataset.date;

  const job = jobById(jobId);

  if(!job) return;

  let a = assignmentId
    ? assignmentById(assignmentId)
    : null;

  if(!a){

    a = {
      id: nextId(db.assignments),
      jobId,
      workerId: null,
      vehicleId: null,
      date,
      load: Number(job.load || 100),
      vehicleLoad: Number(job.vehicleLoad || 100)
    };

    db.assignments.push(a);
  }

  a.date = date;

  if(rowKind === "worker"){

    a.workerId = rowId;

    const w = workerById(rowId);

    if(w && !workerHasSkill(w, job.skill)){
      setStatus("Upozornění: pracovník nemá požadovanou specializaci");
    }
  }

  if(rowKind === "vehicle"){
    a.vehicleId = rowId;
  }

  if(job.state === "Nová"){
    job.state = "Naplánováno";
  }

  await saveDb();

  render();
}

async function saveJob(){

  if(!canEdit){
    alert("Nemáte oprávnění k úpravám");
    return;
  }

  const p = getJobPayload();

  if(!p.title){
    alert("Vyplň název zakázky.");
    return;
  }

  if(selectedJobId){

    const i = db.jobs.findIndex(
      j => Number(j.id) === Number(selectedJobId)
    );

    db.jobs[i] = {
      ...db.jobs[i],
      ...p
    };

  }else{

    db.jobs.push({
      id: nextId(db.jobs),
      invoiced: p.state === "Vyfakturováno",
      ...p
    });
  }

  if(p.state === "Vyfakturováno"){

    const j = selectedJobId
      ? jobById(selectedJobId)
      : db.jobs[db.jobs.length - 1];

    if(j){
      j.invoiced = true;
    }
  }

  const ok = await saveDb();

  if(!ok) return;

  closeModal("jobModal");

  render();
}

async function importData(e){

  if(!canEdit){
    alert("Nemáte oprávnění k úpravám");
    return;
  }

  const file = e.target.files[0];

  if(!file) return;

  const r = new FileReader();

  r.onload = async () => {

    try{

      let imported = JSON.parse(r.result);

      if(imported.data){
        imported = imported.data;
      }

      if(
        !Array.isArray(imported.jobs) ||
        !Array.isArray(imported.workers) ||
        !Array.isArray(imported.vehicles) ||
        !Array.isArray(imported.assignments)
      ){
        alert("Soubor nemá správnou strukturu.");
        return;
      }

      db = imported;

      const ok = await saveDb();

      if(!ok) return;

      render();

      alert("Import hotový.");

    }catch(err){

      console.error("IMPORT ERROR:", err);

      alert("Import se nepodařil: " + err.message);
    }
  };

  r.readAsText(file);

  e.target.value = "";
}
function startRealtime(){

  if(!currentUser) return;

  supabaseClient.removeAllChannels();

  supabaseClient
    .channel('app_state_changes')
    .on(
      'postgres_changes',
      {
        event: '*',
        schema: 'public',
        table: 'app_state',
        filter: `id=eq.1`
      },
      async () => {

        const { data, error } = await supabaseClient
          .from("app_state")
          .select("data")
          .eq("id", 1)
          .single();

        if(error){
          console.error(error);
          return;
        }

        if(data?.data){
          db = data.data;
          render();
          setStatus("Aktualizováno z cloudu");
        }
      }
    )
    .subscribe((status) => {
      console.log("Realtime:", status);
    });

  realtimeSubscribed = true;
}
