<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>EL-Morrel Dispecink</title>
  <style>
    :root{--blue:#0f6cbd;--bg:#f4f7fb;--card:#fff;--line:#dbe3ef;--text:#152033;--muted:#607086;--red:#dc2626;--orange:#d97706;--green:#16a34a;--shadow:0 8px 24px rgba(15,35,65,.10)}
    *{box-sizing:border-box} body{
margin:0;
font-family:Segoe UI,Arial,sans-serif;
background:var(--bg);
color:var(--text);
overflow:hidden;
height:100vh
}
    header{height:58px;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 18px} header h1{margin:0;font-size:20px}.status{font-size:13px}
    .toolbar{position:sticky;top:0;z-index:20;background:#fff;border-bottom:1px solid var(--line);display:flex;gap:8px;align-items:center;padding:10px 14px;box-shadow:0 2px 8px rgba(0,0,0,.03);flex-wrap:wrap}
    button{border:0;border-radius:8px;background:var(--blue);color:white;padding:9px 12px;font-weight:650;cursor:pointer}button.secondary{background:#e8eef7;color:#152033}button.danger{background:var(--red)}
    input,select,textarea{border:1px solid #cbd5e1;border-radius:8px;padding:9px;font:inherit;background:#fff;width:100%}.toolbar input,.toolbar select{width:auto;min-width:170px}
    .layout{
display:grid;
grid-template-columns:320px 1fr;
height:calc(100vh - 108px);
overflow:hidden
} aside{background:#fff;border-right:1px solid var(--line);padding:12px;overflow:auto} aside h2{font-size:16px;margin:10px 0}
    .tabs{display:flex;gap:6px;margin-bottom:10px}.tab{background:#eef4fb;color:#24364c;padding:8px 10px;border-radius:8px;cursor:pointer;font-weight:650;font-size:13px}.tab.active{background:var(--blue);color:#fff}.list{display:flex;flex-direction:column;gap:8px}
    .board-wrap{
overflow:auto;
padding:12px;
width:100%;
height:100%;
touch-action:pan-x pan-y;
cursor:grab;
-webkit-overflow-scrolling:touch
}.board{
min-width:1800px;
width:max-content;
background:#fff;
border:1px solid var(--line);
border-radius:14px;
overflow:visible;
box-shadow:var(--shadow)
}.head,.row{
display:grid;
grid-template-columns:240px repeat(7,260px)
}.head{position:sticky;top:49px;z-index:12;background:#f8fbff}.head>div{padding:12px;border-right:1px solid var(--line);border-bottom:1px solid var(--line);font-weight:800;text-align:center}
    .name-cell{min-height:128px;background:#fff;padding:12px;border-right:1px solid var(--line);border-bottom:1px solid var(--line);font-weight:800}.sub{font-size:12px;color:var(--muted);font-weight:400;margin-top:4px;word-break:break-word}.cell{min-height:128px;background:#fff;padding:7px;border-right:1px solid var(--line);border-bottom:1px solid var(--line)}.cell.dragover{background:#eaf4ff;outline:3px solid #8bc5ff;outline-offset:-3px}
    .capacity{font-size:12px;color:var(--muted);margin-bottom:5px;display:flex;justify-content:space-between;gap:6px}.over{color:#b91c1c;font-weight:800}
    .job{border-radius:11px;padding:8px 9px;margin:0 0 7px;background:#e7f1ff;border-left:5px solid var(--blue);box-shadow:0 2px 6px rgba(0,0,0,.10);cursor:grab}.job.high{background:#fee2e2;border-left-color:var(--red)}.job.medium{background:#fff4d6;border-left-color:var(--orange)}.job.low{background:#dcfce7;border-left-color:var(--green)}.job-title{font-weight:800;font-size:13px;line-height:1.2}.job-meta{font-size:12px;color:#40546c;margin-top:3px;line-height:1.25}.badges{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}.badge{font-size:11px;background:rgba(255,255,255,.75);border:1px solid rgba(0,0,0,.08);border-radius:99px;padding:2px 6px}
    .modal{display:none;position:fixed;inset:0;background:rgba(15,23,42,.58);z-index:80;align-items:center;justify-content:center;padding:18px}.modal.open{display:flex}.dialog{background:#fff;border-radius:16px;box-shadow:0 24px 80px rgba(0,0,0,.32);width:min(860px,100%);max-height:92vh;overflow:auto;padding:18px}.dialog h2{margin:0 0 14px;font-size:20px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.full{grid-column:1/-1}label{font-size:13px;font-weight:700;color:#30435a}.actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}.notice{padding:10px 14px;background:#fff7ed;color:#9a3412;border-bottom:1px solid #fed7aa;font-size:13px}.log{white-space:pre-wrap;background:#0f172a;color:#e2e8f0;padding:10px;border-radius:8px;max-height:260px;overflow:auto;font-family:Consolas,monospace;font-size:12px}.small{font-size:12px;color:var(--muted)}.mode{padding:2px 7px;border-radius:99px;background:#eaf4ff;color:#0b5cab;font-weight:800}
    @media(max-width:900px){.layout{grid-template-columns:1fr}aside{border-right:0;border-bottom:1px solid var(--line)}}
  </style>
</head>
<body>
<header><h1>EL-Morrel Dispecink</h1><div class="status"><span id="modeBadge" class="mode">EL‑MORREL</span> <span id="status">Pripraveno</span></div></header>

<div class="toolbar"><button onclick="openJob()">+ Zakazka</button><button onclick="openWorker()">+ Pracovnik</button><button onclick="openVehicle()">+ Vozidlo</button><button class="secondary" onclick="prevWeek()">predchozi tyden</button><button class="secondary" onclick="today()">dnes</button><button class="secondary" onclick="nextWeek()">dalsi tyden</button><input id="q" placeholder="Hledat zakazku/adresu/kontakt..." oninput="render()" /><select id="viewMode" onchange="render()"><option value="workers">Pohled podle pracovniku</option><option value="vehicles">Pohled podle vozidel</option></select><button class="secondary" onclick="loadAll()">Obnovit</button></div>
<div class="layout"><aside><div class="tabs"><div class="tab active" id="tabJobs" onclick="switchTab('jobs')">Zakazky</div><div class="tab" id="tabPeople" onclick="switchTab('people')">Lide</div><div class="tab" id="tabCars" onclick="switchTab('cars')">Vozidla</div></div><section id="sideJobs"><h2>Neprirazene zakazky</h2><div id="unassigned" class="list"></div></section><section id="sidePeople" style="display:none"><h2>Pracovnici</h2><div id="peopleList" class="list"></div></section><section id="sideCars" style="display:none"><h2>Vozidla</h2><div id="carsList" class="list"></div></section></aside><main class="board-wrap"><div class="board"><div id="head" class="head"></div><div id="body"></div></div></main></div>
<div id="jobModal" class="modal"><div class="dialog"><h2 id="jobTitleModal">Zakazka</h2><div class="grid"><label>Nazev<input id="j_title"></label><label>Priorita<select id="j_priority"><option>Vysoka</option><option>Stredni</option><option>Nizka</option></select></label><label class="full">Adresa<input id="j_address"></label><label>Kontakt<input id="j_contact"></label><label>Telefon<input id="j_phone"></label><label>Stav<input id="j_state" placeholder="Planovano"></label><label>Vytizeni %<input id="j_load" type="number" min="0" max="200" step="25" value="100"></label><label>Cas od<input id="j_from" type="time"></label><label>Cas do<input id="j_to" type="time"></label><label class="full">Poznamka<textarea id="j_note" rows="4"></textarea></label></div><div class="actions"><button class="secondary" onclick="closeModal('jobModal')">Zavrit</button><button onclick="saveJob()">Ulozit</button></div></div></div>
<div id="workerModal" class="modal"><div class="dialog"><h2>Pracovnik</h2><div class="grid"><label>Jmeno<input id="w_title"></label><label>Email<input id="w_email"></label><label>Telefon<input id="w_phone"></label><label>Kapacita na den %<input id="w_capacity" type="number" value="100"></label></div><div class="actions"><button class="secondary" onclick="closeModal('workerModal')">Zavrit</button><button onclick="saveWorker()">Ulozit</button></div></div></div>
<div id="vehicleModal" class="modal"><div class="dialog"><h2>Vozidlo</h2><div class="grid"><label>Nazev / oznaceni<input id="v_title" placeholder="Dodavka 1"></label><label>SPZ<input id="v_spz"></label><label>Typ<input id="v_type" placeholder="Dodavka / osobni / nakladni"></label><label>Kapacita %<input id="v_capacity" type="number" value="100"></label><label class="full">Poznamka<textarea id="v_note" rows="3"></textarea></label></div><div class="actions"><button class="secondary" onclick="closeModal('vehicleModal')">Zavrit</button><button onclick="saveVehicle()">Ulozit</button></div></div></div>
</div>
<script>
const DEFAULT_CONFIG={useSharePoint:false,siteUrl:"https://elmorrel.sharepoint.com/sites/all",lists:{jobs:"Zakázky",workers:"Pracovnici",vehicles:"Vozidla",assignments:"Plan přiřazení"}};
let config=JSON.parse(localStorage.getItem("elm_config")||"null")||DEFAULT_CONFIG;let db={jobs:[],workers:[],vehicles:[],assignments:[]};let weekStart=monday(new Date());let selectedJob=null;let listTypes={};
function setStatus(t){document.getElementById("status").textContent=t}function log(t){const l=document.getElementById("log");if(l)l.textContent=`[${new Date().toLocaleTimeString()}] ${t}\n`+l.textContent;console.log(t)}function esc(v){return String(v??"").replace(/[&<>"']/g,s=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[s]))}function id(){return Date.now()+Math.floor(Math.random()*1000)}function monday(d){let x=new Date(d);let day=x.getDay()||7;x.setDate(x.getDate()-day+1);x.setHours(0,0,0,0);return x}function addDays(d,n){let x=new Date(d);x.setDate(x.getDate()+n);return x}function iso(d){let x=new Date(d);return `${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,"0")}-${String(x.getDate()).padStart(2,"0")}`}function cz(d){return d.toLocaleDateString("cs-CZ",{weekday:"short",day:"numeric",month:"numeric"})}function cls(p){p=String(p||"").toLowerCase();if(p.includes("vys")||p.includes("high"))return"high";if(p.includes("niz")||p.includes("níz")||p.includes("low"))return"low";return"medium"}function openModal(id){document.getElementById(id).classList.add("open")}function closeModal(id){document.getElementById(id).classList.remove("open")}
function seed(){if(localStorage.getItem("elm_db"))return;db={workers:[{Id:1,Title:"Petr Svoboda",Email:"petr@firma.cz",Telefon:"",Kapacita:100},{Id:2,Title:"Jan Novak",Email:"jan@firma.cz",Telefon:"",Kapacita:100},{Id:3,Title:"Milan Cerny",Email:"milan@firma.cz",Telefon:"",Kapacita:100}],vehicles:[{Id:1,Title:"Dodavka 1",SPZ:"1AB 1234",Typ:"Dodavka",Kapacita:100,Poznamka:""},{Id:2,Title:"Dodavka 2",SPZ:"2AB 5678",Typ:"Dodavka",Kapacita:100,Poznamka:""}],jobs:[{Id:1,Title:"Montaz Praha",Adresa:"Praha 4",Kontakt:"Klient A",Telefon:"+420 777 111 222",Priorita:"Vysoka",Stav:"Planovano",Vytizeni:100,CasOd:"08:00",CasDo:"15:00",Poznamka:""},{Id:2,Title:"Servis Cerpadla",Adresa:"Pruhonice",Kontakt:"Klient B",Telefon:"+420 777 222 333",Priorita:"Stredni",Stav:"Planovano",Vytizeni:50,CasOd:"09:00",CasDo:"12:00",Poznamka:""}],assignments:[]};localStorage.setItem("elm_db",JSON.stringify(db))}function loadLocal(){seed();db=JSON.parse(localStorage.getItem("elm_db"))}function saveLocal(){localStorage.setItem("elm_db",JSON.stringify(db))}
async function spFetch(url,opt={}){const r=await fetch(url,{credentials:"same-origin",...opt,headers:{"Accept":"application/json;odata=verbose",...(opt.headers||{})}});const txt=await r.text();let data={};try{data=txt?JSON.parse(txt):{}}catch(e){data={raw:txt}}if(!r.ok)throw new Error(`${r.status} ${r.statusText}: ${txt}`);return data}function encList(n){return String(n).replace(/'/g,"''")}async function digest(){let d=await spFetch(`${config.siteUrl}/_api/contextinfo`,{method:"POST"});return d.d.GetContextWebInformation.FormDigestValue}async function itemType(list){if(listTypes[list])return listTypes[list];let d=await spFetch(`${config.siteUrl}/_api/web/lists/getbytitle('${encList(list)}')?$select=ListItemEntityTypeFullName`);return listTypes[list]=d.d.ListItemEntityTypeFullName}async function spItems(list){let d=await spFetch(`${config.siteUrl}/_api/web/lists/getbytitle('${encList(list)}')/items?$top=5000`);return d.d.results||[]}async function spCreate(list,payload){let dg=await digest(),type=await itemType(list);let d=await spFetch(`${config.siteUrl}/_api/web/lists/getbytitle('${encList(list)}')/items`,{method:"POST",headers:{"Content-Type":"application/json;odata=verbose","X-RequestDigest":dg},body:JSON.stringify({__metadata:{type},...payload})});return d.d}async function spUpdate(list,itemId,payload){let dg=await digest(),type=await itemType(list);await spFetch(`${config.siteUrl}/_api/web/lists/getbytitle('${encList(list)}')/items(${itemId})`,{method:"POST",headers:{"Content-Type":"application/json;odata=verbose","X-RequestDigest":dg,"IF-MATCH":"*","X-HTTP-Method":"MERGE"},body:JSON.stringify({__metadata:{type},...payload})})}
async function loadAll(){try{document.getElementById("modeBadge").textContent=config.useSharePoint?"CLOUD":"ONLINE";setStatus("Nacitam...");if(config.useSharePoint){db.workers=await spItems(config.lists.workers);db.jobs=await spItems(config.lists.jobs);db.vehicles=await spItems(config.lists.vehicles);db.assignments=await spItems(config.lists.assignments)}else loadLocal();render();setStatus(`Nacteno: ${db.jobs.length} zakazek, ${db.workers.length} lidi, ${db.vehicles.length} vozidel`)}catch(e){setStatus("Chyba");log("CHYBA: "+e.message);console.log("config hidden")}}
function switchTab(t){["Jobs","People","Cars"].forEach(x=>document.getElementById("side"+x).style.display="none");["tabJobs","tabPeople","tabCars"].forEach(x=>document.getElementById(x).classList.remove("active"));if(t==="jobs"){sideJobs.style.display="block";tabJobs.classList.add("active")}if(t==="people"){sidePeople.style.display="block";tabPeople.classList.add("active")}if(t==="cars"){sideCars.style.display="block";tabCars.classList.add("active")}}function prevWeek(){weekStart=addDays(weekStart,-7);render()}function nextWeek(){weekStart=addDays(weekStart,7);render()}function today(){weekStart=monday(new Date());render()}function render(){renderHeader();renderSide();renderBoard()}function renderHeader(){let h=[""].concat(Array.from({length:7},(_,i)=>cz(addDays(weekStart,i))));head.innerHTML=h.map(x=>`<div>${esc(x)}</div>`).join("")}function queryMatch(job){const q=document.getElementById("q").value.toLowerCase().trim();if(!q)return true;return[job.Title,job.Adresa,job.Kontakt,job.Telefon,job.Poznamka,job.Stav].join(" ").toLowerCase().includes(q)}function assignedJobIds(){return new Set(db.assignments.map(a=>Number(a.ZakazkaId)))}
function renderSide(){const assigned=assignedJobIds();unassigned.innerHTML=db.jobs.filter(j=>!assigned.has(Number(j.Id))&&queryMatch(j)).map(j=>jobCard(j,null)).join("")||`<div class="small">Zadne neprirazene zakazky.</div>`;peopleList.innerHTML=db.workers.map(w=>`<div class="job" ondblclick="openWorker(${w.Id})"><div class="job-title">${esc(w.Title)}</div><div class="job-meta">${esc(w.Email||"")}</div><span class="badge">${esc(w.Kapacita||100)}%</span></div>`).join("");carsList.innerHTML=db.vehicles.map(v=>`<div class="job" ondblclick="openVehicle(${v.Id})"><div class="job-title">${esc(v.Title)}</div><div class="job-meta">${esc(v.SPZ||"")} ${esc(v.Typ||"")}</div><span class="badge">${esc(v.Kapacita||100)}%</span></div>`).join("")}
function rows(){const mode=document.getElementById("viewMode").value;return mode==="vehicles"?db.vehicles.map(v=>({type:"vehicle",Id:v.Id,Title:v.Title,sub:`${v.SPZ||""} ${v.Typ||""}`,capacity:Number(v.Kapacita||100)})):db.workers.map(w=>({type:"worker",Id:w.Id,Title:w.Title,sub:w.Email||"",capacity:Number(w.Kapacita||100)}))}function rowAssignments(row,date){const d=iso(date);if(row.type==="worker")return db.assignments.filter(a=>Number(a.PracovnikId)===Number(row.Id)&&String(a.Datum||"").slice(0,10)===d);return db.assignments.filter(a=>Number(a.VozidloId)===Number(row.Id)&&String(a.Datum||"").slice(0,10)===d)}function loadUsed(row,ass){if(row.type==="worker")return ass.reduce((s,a)=>s+Number(a.Vytizeni||100),0);return ass.reduce((s,a)=>s+Number(a.VytizeniVozidla||100),0)}
function renderBoard(){body.innerHTML="";rows().forEach(r=>{let html=`<div class="row"><div class="name-cell">${esc(r.Title)}<div class="sub">${esc(r.sub)}</div></div>`;for(let i=0;i<7;i++){const date=addDays(weekStart,i),ass=rowAssignments(r,date),used=loadUsed(r,ass);html+=`<div class="cell" data-rowtype="${r.type}" data-id="${r.Id}" data-date="${iso(date)}" ondragover="allowDrop(event)" ondragleave="dragLeave(event)" ondrop="dropJob(event)"><div class="capacity ${used>r.capacity?'over':''}"><span>${used}/${r.capacity}%</span><span>${used>r.capacity?'PRETIZENO':''}</span></div>`;ass.forEach(a=>{const j=db.jobs.find(x=>Number(x.Id)===Number(a.ZakazkaId));if(j&&queryMatch(j))html+=jobCard(j,a)});html+=`</div>`}html+=`</div>`;body.innerHTML+=html})}
function jobCard(j,a){const worker=a?db.workers.find(w=>Number(w.Id)===Number(a.PracovnikId)):null;const car=a?db.vehicles.find(v=>Number(v.Id)===Number(a.VozidloId)):null;return`<div class="job ${cls(j.Priorita)}" draggable="true" data-job="${j.Id}" data-assignment="${a?a.Id:""}" ondragstart="dragJob(event)" ondblclick="openJob(${j.Id})"><div class="job-title">${esc(j.Title)}</div><div class="job-meta">${esc(j.Adresa||"")}</div><div class="job-meta">${esc(j.Kontakt||"")} ${esc(j.Telefon||"")}</div><div class="badges"><span class="badge">${esc(j.Priorita||"Stredni")}</span><span class="badge">${esc(a?a.Vytizeni:(j.Vytizeni||100))}%</span>${worker?`<span class="badge">👤 ${esc(worker.Title)}</span>`:""}${car?`<span class="badge">🚐 ${esc(car.Title)}</span>`:""}</div></div>`}
function allowDrop(e){e.preventDefault();e.currentTarget.classList.add("dragover")}function dragLeave(e){e.currentTarget.classList.remove("dragover")}function dragJob(e){
document.querySelector(".board-wrap").style.cursor="grabbing";
e.dataTransfer.setData("job",e.currentTarget.dataset.job);
e.dataTransfer.setData("assignment",e.currentTarget.dataset.assignment||"")
}async function dropJob(e){
document.querySelector(".board-wrap").style.cursor="grab";
e.preventDefault();e.currentTarget.classList.remove("dragover");const jobId=Number(e.dataTransfer.getData("job")),assId=Number(e.dataTransfer.getData("assignment")||0),rowtype=e.currentTarget.dataset.rowtype,rowId=Number(e.currentTarget.dataset.id),date=e.currentTarget.dataset.date;const existing=assId?db.assignments.find(a=>Number(a.Id)===assId):db.assignments.find(a=>Number(a.ZakazkaId)===jobId);const job=db.jobs.find(j=>Number(j.Id)===jobId);let payload={Title:`${job.Title} - ${date}`,ZakazkaId:jobId,Datum:date,Vytizeni:Number(job.Vytizeni||100),VytizeniVozidla:100};if(existing)payload={...existing,...payload};if(rowtype==="worker")payload.PracovnikId=rowId;if(rowtype==="vehicle")payload.VozidloId=rowId;await upsertAssignment(existing?.Id,payload)}
async function upsertAssignment(assId,payload){try{setStatus("Ukladam prirazeni...");if(config.useSharePoint){if(assId)await spUpdate(config.lists.assignments,assId,payload);else await spCreate(config.lists.assignments,payload);await loadAll()}else{if(assId){let i=db.assignments.findIndex(a=>Number(a.Id)===Number(assId));db.assignments[i]={...db.assignments[i],...payload}}else db.assignments.push({Id:id(),...payload});saveLocal();render()}setStatus("Ulozeno")}catch(e){setStatus("Chyba");log("CHYBA pri ulozeni prirazeni: "+e.message);console.log("config hidden")}}
function openJob(jobId){selectedJob=jobId||null;const j=selectedJob?db.jobs.find(x=>Number(x.Id)===Number(selectedJob)):null;jobTitleModal.textContent=j?"Detail zakazky":"Nova zakazka";j_title.value=j?.Title||"";j_address.value=j?.Adresa||"";j_contact.value=j?.Kontakt||"";j_phone.value=j?.Telefon||"";j_priority.value=j?.Priorita||"Stredni";j_state.value=j?.Stav||"Planovano";j_load.value=j?.Vytizeni||100;j_from.value=j?.CasOd||"";j_to.value=j?.CasDo||"";j_note.value=j?.Poznamka||"";openModal("jobModal")}async function saveJob(){const p={Title:j_title.value,Adresa:j_address.value,Kontakt:j_contact.value,Telefon:j_phone.value,Priorita:j_priority.value,Stav:j_state.value,Vytizeni:Number(j_load.value||100),CasOd:j_from.value,CasDo:j_to.value,Poznamka:j_note.value};try{if(config.useSharePoint){if(selectedJob)await spUpdate(config.lists.jobs,selectedJob,p);else await spCreate(config.lists.jobs,p);await loadAll()}else{if(selectedJob){let i=db.jobs.findIndex(x=>Number(x.Id)===Number(selectedJob));db.jobs[i]={...db.jobs[i],...p}}else db.jobs.push({Id:id(),...p});saveLocal();render()}closeModal("jobModal");setStatus("Zakazka ulozena")}catch(e){log("CHYBA zakazka: "+e.message);console.log("config hidden")}}
function openWorker(workerId){const w=workerId?db.workers.find(x=>Number(x.Id)===Number(workerId)):null;window.selectedWorker=workerId||null;w_title.value=w?.Title||"";w_email.value=w?.Email||"";w_phone.value=w?.Telefon||"";w_capacity.value=w?.Kapacita||100;openModal("workerModal")}async function saveWorker(){const p={Title:w_title.value,Email:w_email.value,Telefon:w_phone.value,Kapacita:Number(w_capacity.value||100)};try{if(config.useSharePoint){if(window.selectedWorker)await spUpdate(config.lists.workers,window.selectedWorker,p);else await spCreate(config.lists.workers,p);await loadAll()}else{if(window.selectedWorker){let i=db.workers.findIndex(x=>Number(x.Id)===Number(window.selectedWorker));db.workers[i]={...db.workers[i],...p}}else db.workers.push({Id:id(),...p});saveLocal();render()}closeModal("workerModal")}catch(e){log("CHYBA pracovnik: "+e.message);console.log("config hidden")}}
function openVehicle(vehicleId){const v=vehicleId?db.vehicles.find(x=>Number(x.Id)===Number(vehicleId)):null;window.selectedVehicle=vehicleId||null;v_title.value=v?.Title||"";v_spz.value=v?.SPZ||"";v_type.value=v?.Typ||"";v_capacity.value=v?.Kapacita||100;v_note.value=v?.Poznamka||"";openModal("vehicleModal")}async function saveVehicle(){const p={Title:v_title.value,SPZ:v_spz.value,Typ:v_type.value,Kapacita:Number(v_capacity.value||100),Poznamka:v_note.value};try{if(config.useSharePoint){if(window.selectedVehicle)await spUpdate(config.lists.vehicles,window.selectedVehicle,p);else await spCreate(config.lists.vehicles,p);await loadAll()}else{if(window.selectedVehicle){let i=db.vehicles.findIndex(x=>Number(x.Id)===Number(window.selectedVehicle));db.vehicles[i]={...db.vehicles[i],...p}}else db.vehicles.push({Id:id(),...p});saveLocal();render()}closeModal("vehicleModal")}catch(e){log("CHYBA vozidlo: "+e.message);console.log("config hidden")}}
function console.log("config hidden"){c_site.value=config.siteUrl;c_jobs.value=config.lists.jobs;c_workers.value=config.lists.workers;c_vehicles.value=config.lists.vehicles;c_assignments.value=config.lists.assignments;c_sp.checked=!!config.useSharePoint;openModal("configModal")}function saveConfig(){config={...config,useSharePoint:c_sp.checked,siteUrl:c_site.value.trim(),lists:{jobs:c_jobs.value,workers:c_workers.value,vehicles:c_vehicles.value,assignments:c_assignments.value}};localStorage.setItem("elm_config",JSON.stringify(config));closeModal("configModal");loadAll()}
loadAll();
