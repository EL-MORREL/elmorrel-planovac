<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EL‑Morrel Dispečink PRO</title>
<style>
:root{
--blue:#0f6cbd;
--bg:#f3f6fb;
--line:#d9e2ef;
--text:#152033;
--muted:#5f7188;
--green:#16a34a;
--orange:#d97706;
--red:#dc2626;
}
*{box-sizing:border-box}
body{
margin:0;
font-family:Segoe UI,Arial,sans-serif;
background:var(--bg);
color:var(--text);
overflow:hidden;
}
header{
height:60px;
background:var(--blue);
color:#fff;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 18px;
font-weight:700;
}
.toolbar{
background:#fff;
padding:10px;
border-bottom:1px solid var(--line);
display:flex;
gap:8px;
flex-wrap:wrap;
}
button{
border:0;
background:var(--blue);
color:#fff;
padding:10px 12px;
border-radius:8px;
cursor:pointer;
font-weight:700;
}
button.secondary{
background:#e7eef8;
color:#17324d;
}
.layout{
display:grid;
grid-template-columns:320px 1fr;
height:calc(100vh - 110px);
overflow:hidden;
}
.sidebar{
background:#fff;
border-right:1px solid var(--line);
padding:12px;
overflow:auto;
}
.boardwrap{
overflow:auto;
padding:12px;
}
.board{
min-width:1900px;
background:#fff;
border:1px solid var(--line);
border-radius:14px;
overflow:visible;
}
.head,.row{
display:grid;
grid-template-columns:240px repeat(7,250px);
}
.head div{
padding:12px;
border-right:1px solid var(--line);
border-bottom:1px solid var(--line);
font-weight:800;
background:#f7fbff;
text-align:center;
}
.name{
padding:12px;
border-right:1px solid var(--line);
border-bottom:1px solid var(--line);
font-weight:800;
background:#fff;
min-height:160px;
}
.sub{
font-size:12px;
color:var(--muted);
margin-top:5px;
font-weight:400;
}
.cell{
min-height:160px;
border-right:1px solid var(--line);
border-bottom:1px solid var(--line);
padding:6px;
background:#fff;
}
.cell.over{
background:#dbeafe;
}
.job{
padding:9px;
border-radius:10px;
margin-bottom:8px;
cursor:grab;
box-shadow:0 2px 8px rgba(0,0,0,.12);
}
.high{background:#fee2e2;border-left:5px solid var(--red)}
.medium{background:#fef3c7;border-left:5px solid var(--orange)}
.low{background:#dcfce7;border-left:5px solid var(--green)}
.job-title{
font-weight:800;
font-size:13px;
}
.job-meta{
font-size:12px;
margin-top:4px;
color:#334155;
}
.badges{
display:flex;
gap:4px;
flex-wrap:wrap;
margin-top:6px;
}
.badge{
background:rgba(255,255,255,.7);
padding:2px 6px;
border-radius:99px;
font-size:11px;
}
.progress{
height:8px;
background:#e5e7eb;
border-radius:99px;
overflow:hidden;
margin-top:6px;
}
.progress > div{
height:100%;
}
.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.5);
align-items:center;
justify-content:center;
padding:20px;
z-index:100;
}
.modal.open{
display:flex;
}
.dialog{
background:#fff;
width:min(850px,100%);
max-height:92vh;
overflow:auto;
border-radius:16px;
padding:18px;
}
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}
.full{
grid-column:1/-1;
}
input,select,textarea{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #cbd5e1;
}
label{
font-size:13px;
font-weight:700;
}
.actions{
display:flex;
justify-content:flex-end;
gap:8px;
margin-top:14px;
}
.empty{
padding:12px;
border:1px dashed #cbd5e1;
border-radius:10px;
font-size:13px;
color:var(--muted);
}
</style>
</head>
<body>

<header>
<div>EL‑Morrel Dispečink PRO</div>
<div id="status">Připraveno</div>
</header>

<div class="toolbar">
<button onclick="openJob()">+ Zakázka</button>
<button onclick="openWorker()">+ Pracovník</button>
<button onclick="openVehicle()">+ Vozidlo</button>
<button class="secondary" onclick="toggleArchive()">Archiv</button>
</div>

<div class="layout">

<div class="sidebar">
<h3>Nepřiřazené zakázky</h3>
<div id="jobs"></div>
</div>

<div class="boardwrap">
<div class="board">
<div class="head" id="head"></div>
<div id="body"></div>
</div>
</div>

</div>

<div class="modal" id="jobModal">
<div class="dialog">
<h2>Zakázka</h2>

<div class="grid">

<label>Název
<input id="j_title">
</label>

<label>Priorita
<select id="j_priority">
<option>Vysoká</option>
<option>Střední</option>
<option>Nízká</option>
</select>
</label>

<label class="full">Adresa
<input id="j_address">
</label>

<label>Kontakt
<input id="j_contact">
</label>

<label>Telefon
<input id="j_phone">
</label>

<label>Počet dní
<input id="j_days" type="number" value="1">
</label>

<label>Počet pracovníků
<input id="j_people" type="number" value="1">
</label>

<label>Člověkodny odhad
<input id="j_estimated" type="number" value="1">
</label>

<label>Stav
<select id="j_state">
<option>Nová</option>
<option>Naplánováno</option>
<option>Probíhá</option>
<option>Dokončeno</option>
<option>Vyfakturováno</option>
<option>Storno</option>
</select>
</label>

<label class="full">Poznámka
<textarea id="j_note" rows="4"></textarea>
</label>

</div>

<div class="actions">
<button class="secondary" onclick="closeModal('jobModal')">Zavřít</button>
<button onclick="saveJob()">Uložit</button>
</div>

</div>
</div>

<script>

const STORAGE="elmorrel_pro_v2";

let db=load();

function seed(){

if(db.jobs.length) return;

db.workers=[
{id:1,name:"Petr Svoboda",capacity:100},
{id:2,name:"Jan Novák",capacity:100},
{id:3,name:"Milan Černý",capacity:100}
];

db.vehicles=[
{id:1,name:"Dodávka 1"},
{id:2,name:"Dodávka 2"}
];

db.jobs=[
{
id:1,
title:"Montáž Praha",
address:"Praha 4",
contact:"Klient A",
phone:"+420777111222",
priority:"Vysoká",
days:3,
people:2,
estimated:6,
actual:3,
state:"Probíhá",
note:""
},
{
id:2,
title:"Servis Brno",
address:"Brno",
contact:"Klient B",
phone:"+420777333444",
priority:"Střední",
days:1,
people:1,
estimated:1,
actual:1,
state:"Naplánováno",
note:""
}
];

db.assignments=[
{id:1,jobId:1,workerId:1,day:0},
{id:2,jobId:1,workerId:2,day:1},
{id:3,jobId:1,workerId:1,day:2},
{id:4,jobId:2,workerId:2,day:4}
];

save();

}

function load(){
try{
return JSON.parse(localStorage.getItem(STORAGE)) || {
jobs:[],
workers:[],
vehicles:[],
assignments:[]
};
}catch{
return {
jobs:[],
workers:[],
vehicles:[],
assignments:[]
};
}
}

function save(){
localStorage.setItem(STORAGE,JSON.stringify(db));
}

seed();

const days=["Po","Út","St","Čt","Pá","So","Ne"];

function renderHead(){

head.innerHTML=
"<div>Pracovník</div>"+
days.map(d=>`<div>${d}</div>`).join("");

}

function calcActual(jobId){

return db.assignments.filter(a=>a.jobId===jobId).length;

}

function progress(job){

const estimated=Math.max(Number(job.estimated||1),1);
const actual=calcActual(job.id);

const percent=Math.round((actual/estimated)*100);

let color="#16a34a";

if(percent>100) color="#dc2626";
else if(percent>80) color="#d97706";

return {actual,percent,color};

}

function renderJobs(){

const active=db.jobs.filter(j=>
!archiveMode
? !["Dokončeno","Vyfakturováno","Storno"].includes(j.state)
: true
);

jobs.innerHTML="";

if(!active.length){
jobs.innerHTML="<div class='empty'>Žádné zakázky.</div>";
return;
}

active.forEach(job=>{

const p=progress(job);

jobs.innerHTML+=`
<div class="job ${priorityClass(job.priority)}"
draggable="true"
data-job="${job.id}"
ondragstart="dragJob(event)"
ondblclick="editJob(${job.id})">

<div class="job-title">${job.title}</div>

<div class="job-meta">${job.address}</div>

<div class="job-meta">${job.contact}</div>

<div class="badges">
<span class="badge">${job.state}</span>
<span class="badge">${job.days} dní</span>
<span class="badge">${job.people} lidí</span>
</div>

<div class="progress">
<div style="
width:${Math.min(p.percent,100)}%;
background:${p.color}">
</div>
</div>

<div class="job-meta">
${p.actual}/${job.estimated} člověkodnů
${p.percent>100 ? " • PŘETAŽENO" : ""}
</div>

</div>
`;

});

}

function priorityClass(p){

if(p==="Vysoká") return "high";
if(p==="Nízká") return "low";
return "medium";

}

function renderBoard(){

body.innerHTML="";

db.workers.forEach(worker=>{

let row=`
<div class="row">
<div class="name">
${worker.name}
<div class="sub">${worker.capacity}% kapacita</div>
</div>
`;

for(let d=0;d<7;d++){

const ass=db.assignments.filter(a=>
a.workerId===worker.id &&
a.day===d
);

row+=`
<div class="cell"
data-worker="${worker.id}"
data-day="${d}"
ondragover="allowDrop(event)"
ondrop="dropJob(event)"
ondragleave="leaveDrop(event)">
`;

ass.forEach(a=>{

const job=db.jobs.find(j=>j.id===a.jobId);

if(!job) return;

const p=progress(job);

row+=`
<div class="job ${priorityClass(job.priority)}"
draggable="true"
data-job="${job.id}"
ondragstart="dragJob(event)"
ondblclick="editJob(${job.id})">

<div class="job-title">${job.title}</div>

<div class="job-meta">${job.address}</div>

<div class="badges">
<span class="badge">${job.state}</span>
</div>

<div class="progress">
<div style="
width:${Math.min(p.percent,100)}%;
background:${p.color}">
</div>
</div>

<div class="job-meta">
${p.actual}/${job.estimated}
</div>

</div>
`;

});

row+="</div>";

}

row+="</div>";

body.innerHTML+=row;

});

}

function render(){

renderHead();
renderJobs();
renderBoard();

}

function dragJob(ev){

ev.dataTransfer.setData(
"job",
ev.target.closest(".job").dataset.job
);

}

function allowDrop(ev){

ev.preventDefault();
ev.currentTarget.classList.add("over");

}

function leaveDrop(ev){

ev.currentTarget.classList.remove("over");

}

function dropJob(ev){

ev.preventDefault();

ev.currentTarget.classList.remove("over");

const jobId=Number(
ev.dataTransfer.getData("job")
);

const workerId=Number(
ev.currentTarget.dataset.worker
);

const day=Number(
ev.currentTarget.dataset.day
);

db.assignments.push({
id:Date.now(),
jobId,
workerId,
day
});

save();

render();

}

function openModal(id){
document.getElementById(id).classList.add("open");
}

function closeModal(id){
document.getElementById(id).classList.remove("open");
}

let editId=null;

function openJob(){

editId=null;

j_title.value="";
j_address.value="";
j_contact.value="";
j_phone.value="";
j_days.value=1;
j_people.value=1;
j_estimated.value=1;
j_state.value="Nová";
j_note.value="";

openModal("jobModal");

}

function editJob(id){

const j=db.jobs.find(x=>x.id===id);

if(!j) return;

editId=id;

j_title.value=j.title||"";
j_address.value=j.address||"";
j_contact.value=j.contact||"";
j_phone.value=j.phone||"";
j_priority.value=j.priority||"Střední";
j_days.value=j.days||1;
j_people.value=j.people||1;
j_estimated.value=j.estimated||1;
j_state.value=j.state||"Nová";
j_note.value=j.note||"";

openModal("jobModal");

}

function saveJob(){

const payload={
title:j_title.value,
address:j_address.value,
contact:j_contact.value,
phone:j_phone.value,
priority:j_priority.value,
days:Number(j_days.value),
people:Number(j_people.value),
estimated:Number(j_estimated.value),
state:j_state.value,
note:j_note.value
};

if(editId){

const i=db.jobs.findIndex(j=>j.id===editId);
db.jobs[i]={...db.jobs[i],...payload};

}else{

db.jobs.push({
id:Date.now(),
...payload
});

}

save();

closeModal("jobModal");

render();

}

function openWorker(){

const name=prompt("Jméno pracovníka");

if(!name) return;

db.workers.push({
id:Date.now(),
name,
capacity:100
});

save();
render();

}

function openVehicle(){

const name=prompt("Název vozidla");

if(!name) return;

db.vehicles.push({
id:Date.now(),
name
});

save();

alert("Vozidlo přidáno.");

}

let archiveMode=false;

function toggleArchive(){

archiveMode=!archiveMode;

render();

}

render();

</script>

</body>
</html>
