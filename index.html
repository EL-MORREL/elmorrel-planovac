<!DOCTYPE html><html><head><meta charset='UTF-8'><title>EL‑Morrel</title><style>body{margin:0;font-family:Arial;background:#f3f4f6;overflow:hidden}header{background:#0f6cbd;color:#fff;padding:14px 20px;font-size:24px;font-weight:bold}.layout{display:grid;grid-template-columns:320px 1fr;height:calc(100vh - 58px)}.sidebar{background:#fff;border-right:1px solid #ddd;overflow:auto;padding:12px}.boardwrap{overflow:auto;padding:12px}.board{min-width:1900px}.row,.head{display:grid;grid-template-columns:220px repeat(7,240px)}.head div{background:#e8f1fb;padding:12px;border:1px solid #d0d7e2;font-weight:bold;text-align:center}.name{background:#fff;padding:12px;border:1px solid #d0d7e2;font-weight:bold}.cell{min-height:160px;background:#fff;border:1px solid #d0d7e2;padding:6px}.cell.over{background:#dbeafe}.job{border-radius:10px;padding:8px;margin-bottom:8px;cursor:grab;box-shadow:0 2px 6px rgba(0,0,0,.12)}.job.high{background:#fecaca}.job.medium{background:#fde68a}.job.low{background:#bbf7d0}.job-title{font-weight:bold}.job-meta{font-size:12px;margin-top:4px}button{border:none;background:#0f6cbd;color:#fff;padding:10px 14px;border-radius:8px;cursor:pointer}</style></head><body><header>EL‑Morrel Dispečink</header><div class='layout'><div class='sidebar'><button onclick='resetData()'>Reset demo</button><h3>Nepřiřazené zakázky</h3><div id='unassigned'></div></div><div class='boardwrap'><div class='board'><div class='head' id='head'></div><div id='body'></div></div></div></div><script>const workers=[{id:1,name:'Petr Svoboda'},{id:2,name:'Jan Novák'},{id:3,name:'Milan Černý'},{id:4,name:'Tomáš Veselý'}];const jobs=[{id:1,title:'Montáž Praha',address:'Praha 4',contact:'Klient A',priority:'high'},{id:2,title:'Servis Brno',address:'Brno',contact:'Klient B',priority:'medium'},{id:3,title:'Revize Ostrava',address:'Ostrava',contact:'Klient C',priority:'low'}];let assignments=[];const days=['Pondělí','Úterý','Středa','Čtvrtek','Pátek','Sobota','Neděle'];function renderHead(){let html='<div>Pracovník</div>';days.forEach(d=>{html+=`<div>${d}</div>`});document.getElementById('head').innerHTML=html}function jobCard(job){return `<div class='job ${job.priority}' draggable='true' data-job='${job.id}' ondragstart='dragJob(event)'><div class='job-title'>${job.title}</div><div class='job-meta'>${job.address}</div><div class='job-meta'>${job.contact}</div></div>`}function renderUnassigned(){const used=assignments.map(a=>a.jobId);const freeJobs=jobs.filter(j=>!used.includes(j.id));const el=document.getElementById('unassigned');el.innerHTML='';freeJobs.forEach(job=>{el.innerHTML+=jobCard(job)})}function renderBoard(){const body=document.getElementById('body');body.innerHTML='';workers.forEach(worker=>{let row=`<div class='row'><div class='name'>${worker.name}</div>`;for(let d=0;d<7;d++){const jobsInCell=assignments.filter(a=>a.workerId===worker.id&&a.day===d);row+=`<div class='cell' data-worker='${worker.id}' data-day='${d}' ondragover='allowDrop(event)' ondragleave='leaveDrop(event)' ondrop='dropJob(event)'>`;jobsInCell.forEach(a=>{const job=jobs.find(j=>j.id===a.jobId);if(job){row+=jobCard(job)}});row+='</div>'}row+='</div>';body.innerHTML+=row})}function render(){renderHead();renderBoard();renderUnassigned()}function dragJob(ev){const jobEl=ev.target.closest('.job');ev.dataTransfer.setData('jobId',jobEl.dataset.job)}function allowDrop(ev){ev.preventDefault();ev.currentTarget.classList.add('over')}function leaveDrop(ev){ev.currentTarget.classList.remove('over')}function dropJob(ev){ev.preventDefault();ev.currentTarget.classList.remove('over');const jobId=Number(ev.dataTransfer.getData('jobId'));const workerId=Number(ev.currentTarget.dataset.worker);const day=Number(ev.currentTarget.dataset.day);assignments=assignments.filter(a=>a.jobId!==jobId);assignments.push({jobId,workerId,day});render()}function resetData(){assignments=[{jobId:1,workerId:1,day:0},{jobId:2,workerId:2,day:2}];render()}resetData();</script></body></html>
